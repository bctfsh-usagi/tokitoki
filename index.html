<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- iOS '홈 화면에 추가' 시 전체화면 웹앱으로 실행 (주소창·사파리 메뉴 숨김) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="당근콩콩">
<title>토끼의 당근콩콩 🐰🥕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-1:#ffeaf3; --pink-2:#ffd6e8; --pink-3:#ffbcd8; --pink-4:#ff9ec7;
    --pink-deep:#ff6fa5; --plum:#a85278; --cream:#fff7fb;
    --shadow:0 10px 30px rgba(255,111,165,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Jua',sans-serif; color:var(--plum); overflow:hidden;
    background:radial-gradient(120% 80% at 50% -10%,var(--pink-1),var(--pink-3));
    display:flex;align-items:center;justify-content:center;touch-action:none;
  }
  #app{
    position:relative; width:min(100vw,430px); height:100dvh; max-height:932px;
    overflow:hidden; box-shadow:var(--shadow);
    background:#ffd9ea var(--bg) center/cover no-repeat;
  }
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;text-align:center;
    transition:opacity .4s ease,transform .4s ease;}
  .hidden{opacity:0;pointer-events:none;transform:scale(.96);}
  img{user-select:none;-webkit-user-drag:none;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}

  /* ---------- TITLE ---------- */
  #title h1{font-family:'Jua';font-size:clamp(34px,9vw,46px);color:var(--pink-deep);
    margin:0;line-height:1.15;text-shadow:0 3px 0 #fff,0 6px 14px rgba(255,111,165,.4);}
  #title .sub{font-family:'Gaegu';font-weight:700;font-size:20px;margin:6px 0 0;
    color:var(--plum);background:#ffffffcc;padding:4px 14px;border-radius:14px;}
  .bunny-hero{animation:floaty 2.6s ease-in-out infinite;margin:6px 0;
    filter:drop-shadow(0 14px 10px rgba(255,111,165,.35));}
  .bunny-hero img{height:124px;display:block;}
  .song-list{display:flex;flex-direction:column;gap:11px;width:100%;max-width:320px;margin-top:4px;
    max-height:36vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 6px;}
  .song-list::-webkit-scrollbar{width:6px;}
  .song-list::-webkit-scrollbar-thumb{background:#ffffffaa;border-radius:3px;}
  .diff-row{display:flex;gap:8px;margin:6px 0 4px;}
  .diff-btn{font-family:'Gaegu';font-weight:700;font-size:16px;border:none;cursor:pointer;
    padding:8px 18px;border-radius:18px;background:#ffffffcc;color:var(--plum);
    box-shadow:0 3px 0 #ffffff99;transition:transform .08s;}
  .diff-btn.active{background:var(--pink-deep);color:#fff;box-shadow:0 3px 0 #e1568c;}
  .diff-btn:active{transform:translateY(2px);}
  .song-btn{font-family:'Gaegu';font-weight:700;font-size:21px;border:none;cursor:pointer;
    padding:15px 18px;border-radius:24px;background:linear-gradient(180deg,#fff,var(--pink-1));
    color:var(--plum);box-shadow:0 6px 0 var(--pink-3),0 10px 18px rgba(255,111,165,.25);
    display:flex;align-items:center;gap:12px;transition:transform .08s,box-shadow .08s;}
  .song-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--pink-3);}
  .song-btn .emoji{font-size:28px;}
  .song-btn .meta{margin-left:auto;font-size:14px;color:var(--pink-deep);}
  .hint{font-family:'Gaegu';font-weight:700;font-size:15px;color:var(--plum);
    margin-top:16px;background:#ffffffaa;padding:4px 12px;border-radius:12px;}

  /* ---------- GAME ---------- */
  #game{justify-content:flex-start;padding:0;}
  #hud{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;
    justify-content:space-between;align-items:flex-start;
    padding:calc(14px + env(safe-area-inset-top)) 18px 0;pointer-events:none;}
  .score-box{font-family:'Jua';color:var(--pink-deep);text-shadow:0 2px 0 #fff;}
  .score-box .label{font-family:'Gaegu';font-weight:700;font-size:13px;color:var(--plum);display:block;opacity:.8;}
  .score-box .val{font-size:30px;line-height:1;}
  #songName{font-family:'Gaegu';font-weight:700;font-size:16px;text-align:right;color:var(--plum);
    background:#fff9;padding:2px 10px;border-radius:12px;}
  #backBtn{pointer-events:auto;cursor:pointer;border:none;background:#fff9;color:var(--plum);
    font-family:'Gaegu';font-weight:700;border-radius:14px;padding:6px 12px;font-size:14px;margin-top:6px;}

  #combo{position:absolute;top:30%;left:0;right:0;z-index:25;text-align:center;pointer-events:none;}
  #combo .num{font-family:'Jua';font-size:64px;color:#fff;line-height:1;
    text-shadow:0 0 18px var(--pink-deep),0 4px 0 var(--pink-4);}
  #combo .txt{font-family:'Gaegu';font-weight:700;font-size:22px;color:var(--pink-deep);text-shadow:0 2px 0 #fff;}
  .pop{animation:popc .35s ease;}
  @keyframes popc{0%{transform:scale(.5);opacity:0}40%{transform:scale(1.25);opacity:1}100%{transform:scale(1)}}

  #judge{position:absolute;top:48%;left:0;right:0;text-align:center;z-index:26;pointer-events:none;
    font-family:'Jua';font-size:34px;opacity:0;}
  @keyframes judgep{0%{opacity:0;transform:translateY(10px) scale(.8)}25%{opacity:1;transform:translateY(0) scale(1.1)}100%{opacity:0;transform:translateY(-18px)}}

  #playfield{position:absolute;inset:0;z-index:10;pointer-events:none;}
  #hitline{position:absolute;left:0;right:0;height:96px;z-index:12;pointer-events:none;}
  .target{position:absolute;width:74px;height:74px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#fffffff2,#ffffff66);
    box-shadow:inset 0 -5px 0 rgba(255,111,165,.18),0 6px 14px rgba(255,111,165,.25);
    border:3px solid #fff;display:flex;align-items:center;justify-content:center;transition:transform .07s;}
  .target img{width:48px;height:48px;object-fit:contain;filter:saturate(.92) opacity(.92);}
  .target.flash{animation:tflash .26s ease;}
  @keyframes tflash{0%{transform:scale(1)}40%{transform:scale(1.4);box-shadow:0 0 28px var(--pink-deep)}100%{transform:scale(1)}}

  .note{position:absolute;width:60px;height:60px;margin-left:-30px;z-index:11;
    display:flex;align-items:center;justify-content:center;will-change:transform;pointer-events:none;}
  .note img{max-width:58px;max-height:58px;filter:drop-shadow(0 6px 4px rgba(255,111,165,.3));}
  .note.gone{transition:transform .2s,opacity .2s;opacity:0;transform:scale(1.6);}

  #bunny{position:absolute;bottom:4px;z-index:20;transition:left .12s cubic-bezier(.34,1.56,.64,1);
    transform-origin:bottom center;pointer-events:none;}
  #bunny img{height:104px;display:block;filter:drop-shadow(0 8px 6px rgba(255,111,165,.3));}
  #bunny.hop{animation:hop .32s ease;}
  @keyframes hop{0%{transform:translateY(0) scaleY(1)}30%{transform:translateY(-30px) scaleY(1.06)}100%{transform:translateY(0)}}
  #bunny.sad{animation:shake .34s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px) rotate(-5deg)}75%{transform:translateX(6px) rotate(5deg)}}

  .spark{position:absolute;z-index:22;font-size:22px;pointer-events:none;animation:spk .6s ease forwards;}
  @keyframes spk{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2)}}

  #countdown{position:absolute;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;
    font-family:'Jua';font-size:120px;color:#fff;text-shadow:0 0 24px var(--pink-deep),0 6px 0 var(--pink-4);pointer-events:none;}
  .cd-anim{animation:cdp .9s ease;}
  @keyframes cdp{0%{opacity:0;transform:scale(2)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.6)}}

  /* ---------- RESULT ---------- */
  #result .bunny-end img{height:118px;animation:floaty 2.4s ease-in-out infinite;}
  #result .rank img{height:172px;animation:popc .5s ease;filter:drop-shadow(0 10px 16px rgba(255,111,165,.4));}
  .stat-card{background:#ffffffdd;border-radius:22px;padding:16px 22px;margin-top:10px;width:100%;max-width:300px;
    box-shadow:0 8px 18px rgba(255,111,165,.2);}
  .stat-row{display:flex;justify-content:space-between;font-family:'Gaegu';font-weight:700;font-size:19px;padding:5px 0;}
  .stat-row .v{color:var(--pink-deep);}
  .btn-row{display:flex;gap:12px;margin-top:18px;}
  .pill{font-family:'Gaegu';font-weight:700;font-size:18px;border:none;cursor:pointer;
    padding:14px 22px;border-radius:22px;color:#fff;background:var(--pink-deep);
    box-shadow:0 5px 0 #e1568c,0 8px 16px rgba(255,111,165,.3);transition:transform .08s;}
  .pill.ghost{background:#fff;color:var(--pink-deep);box-shadow:0 5px 0 var(--pink-3);}
  .pill:active{transform:translateY(4px);}
</style>
</head>
<body>
<div id="app">

  <section id="title" class="screen">
    <h1>토끼의<br>당근콩콩</h1>
    <p class="sub">콩콩 떨어지는 친구들을 박자에 맞춰 톡!</p>
    <div class="bunny-hero"><img id="heroBunny" alt="bunny"></div>
    <div class="diff-row" id="diffRow">
      <button class="diff-btn active" data-diff="easy">쉬움</button>
      <button class="diff-btn" data-diff="normal">보통</button>
      <button class="diff-btn" data-diff="hard">어려움</button>
    </div>
    <div class="song-list" id="songList"></div>
    <p class="hint">🎵 동요 멜로디 · 데스크탑은 D F J K</p>
  </section>

  <section id="game" class="screen hidden">
    <div id="hud">
      <div class="score-box"><span class="label">점수</span><span class="val" id="scoreVal">0</span></div>
      <div style="text-align:right">
        <div id="songName">🎵</div>
        <button id="backBtn">← 그만</button>
      </div>
    </div>
    <div id="combo"></div>
    <div id="judge"></div>
    <div id="playfield"></div>
    <div id="hitline"></div>
    <div id="bunny"><img id="bunnyImg" alt="bunny"></div>
    <div id="countdown"></div>
  </section>

  <section id="result" class="screen hidden">
    <div class="bunny-end"><img id="endBunny" alt="bunny"></div>
    <div class="rank"><img id="rankImg" alt="rank"></div>
    <div class="stat-card">
      <div class="stat-row"><span>점수</span><span class="v" id="rScore">0</span></div>
      <div class="stat-row"><span>최대 콤보</span><span class="v" id="rCombo">0</span></div>
      <div class="stat-row"><span>퍼펙트 ✨</span><span class="v" id="rPerfect">0</span></div>
      <div class="stat-row"><span>정확도</span><span class="v" id="rAcc">0%</span></div>
    </div>
    <div class="btn-row">
      <button class="pill ghost" id="toTitle">🏠 곡 선택</button>
      <button class="pill" id="retry">🔁 다시</button>
    </div>
  </section>

</div>

/* Audio */
let actx=null;
function ensureAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();}
function tone(freq,t,dur){
  const o=actx.createOscillator(),o2=actx.createOscillator(),g=actx.createGain(),g2=actx.createGain();
  o.type="triangle";o2.type="sine";o.frequency.value=freq;o2.frequency.value=freq*2;g2.gain.value=0.18;
  o.connect(g);o2.connect(g2);g2.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.28,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0008,t+dur*0.95);
  o.start(t);o2.start(t);o.stop(t+dur);o2.stop(t+dur);
}
function blip(ok){ensureAudio();const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();
  o.type="sine";o.connect(g);g.connect(actx.destination);
  if(ok){o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(1568,t+0.08);}
  else{o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(160,t+0.12);}
  g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.2);}

function layout(){
  const rect=$("#app").getBoundingClientRect();
  const margin=rect.width*0.06, usable=rect.width-margin*2;
  for(let i=0;i<LANES;i++)laneX[i]=margin+usable*((i+0.5)/LANES);
  hitY=rect.height-118; topY=-60;
  hitline.style.top=(hitY-37)+"px"; hitline.innerHTML="";
  for(let i=0;i<LANES;i++){
    const t=document.createElement("div");
    t.className="target"; t.dataset.lane=i;
    t.style.left=(laneX[i]-37)+"px";
    const im=document.createElement("img"); im.src=TARGET_IMG[i]; t.appendChild(im);
    hitline.appendChild(t);
  }
}
window.addEventListener("resize",()=>{if(state&&state.running)layout();});

function buildChart(song,diff){
  const beatMs=song.beat*1000;
  // 밀도 변환: 보통+ 부터 긴 음표(>=2박)를 반박으로 쪼개기
  let notes=song.notes;
  if(diff.density>=1){
    const split=[];
    song.notes.forEach(n=>{
      if(n[1]>=2){split.push([n[0],n[1]/2]);split.push([n[0],n[1]/2]);}
      else split.push(n);
    });
    notes=split;
  }
  const pitches=notes.map(n=>midi(n[0])), lo=Math.min(...pitches), hi=Math.max(...pitches);
  let cum=0; const chart=[];
  notes.forEach((n,i)=>{
    const dur=n[1]*beatMs;
    const lane=hi===lo?0:Math.min(LANES-1,Math.floor((midi(n[0])-lo)/(hi-lo+1e-4)*LANES));
    chart.push({offset:cum,lane,freq:FREQ[n[0]],durBeats:n[1]});
    // 어려움: 일정 간격으로 다른 레인 동시 노트 (양쪽 탭 요구, 소리는 무음)
    if(diff.density>=2 && i>0 && i%5===0){
      const alt=(lane+2)%LANES;
      chart.push({offset:cum,lane:alt,freq:FREQ[n[0]],durBeats:n[1],silent:true});
    }
    cum+=dur;
  });
  return {chart,total:cum};
}

function startGame(key){
  ensureAudio();
  const song=SONGS[key], diff=DIFF[currentDiff]; show("game");
  $("#songName").textContent=song.emoji+" "+song.name+" · "+diff.label;
  layout();
  const {chart,total}=buildChart(song,diff);
  state={key,song,diff,chart,total,travel:diff.travel,win:diff.win,
         running:false,score:0,combo:0,maxCombo:0,perfect:0,great:0,good:0,miss:0};
  scoreEl.textContent="0"; comboEl.innerHTML=""; bunnyImg.src=ASSETS.bunny_idle;
  let c=3; countdownEl.textContent="3"; countdownEl.className="cd-anim";
  const cd=setInterval(()=>{
    c--;
    if(c>0){countdownEl.textContent=c;countdownEl.classList.remove("cd-anim");void countdownEl.offsetWidth;countdownEl.className="cd-anim";}
    else if(c===0){countdownEl.textContent="시작!";countdownEl.classList.remove("cd-anim");void countdownEl.offsetWidth;countdownEl.className="cd-anim";}
    else{clearInterval(cd);countdownEl.textContent="";countdownEl.className="";beginPlay();}
  },800);
}

function beginPlay(){
  const s=state; s.running=true;
  const audioStart=actx.currentTime+0.05; s.perfStart=performance.now()+50;
  s.chart.forEach(n=>{
    if(!n.silent) tone(n.freq,audioStart+n.offset/1000,Math.max(0.25,s.song.beat*n.durBeats*0.9));
    n.hitTime=s.perfStart+n.offset; n.el=null; n.spawned=false; n.judged=false;
  });
  s.endTime=s.perfStart+s.total+s.travel+600;
  requestAnimationFrame(loop);
}

function spawnNote(n){
  const el=document.createElement("div"); el.className="note"; el.style.left=laneX[n.lane]+"px";
  const im=document.createElement("img"); im.src=NOTE_IMG[n.lane]; el.appendChild(im);
  playfield.appendChild(el); n.el=el; n.spawned=true;
}

function loop(now){
  const s=state; if(!s||!s.running)return;
  for(const n of s.chart){
    if(n.judged)continue;
    const tToHit=n.hitTime-now;
    if(!n.spawned&&tToHit<=s.travel)spawnNote(n);
    if(n.spawned){
      const prog=1-(tToHit/s.travel), y=topY+prog*(hitY-topY);
      n.el.style.transform=`translateY(${y}px)`;
      if(now-n.hitTime>s.win.GOOD){n.judged=true;registerMiss(n);}
    }
  }
  if(now>=s.endTime){finish();return;}
  requestAnimationFrame(loop);
}

function tapLane(lane){
  const s=state; if(!s||!s.running)return;
  flashTarget(lane); moveBunny(lane);
  let best=null,bestDt=Infinity; const now=performance.now();
  for(const n of s.chart){
    if(n.lane!==lane||n.judged||!n.spawned)continue;
    const dt=Math.abs(now-n.hitTime); if(dt<bestDt){bestDt=dt;best=n;}
  }
  if(best&&bestDt<=s.win.GOOD){
    best.judged=true;
    registerHit(best,bestDt<=s.win.PERFECT?"PERFECT":bestDt<=s.win.GREAT?"GREAT":"GOOD");
  }
}
function registerHit(n,kind){
  const s=state, add=kind==="PERFECT"?300:kind==="GREAT"?200:100;
  s.score+=add+s.combo*2; s.combo++; s.maxCombo=Math.max(s.maxCombo,s.combo);
  if(kind==="PERFECT")s.perfect++; else if(kind==="GREAT")s.great++; else s.good++;
  scoreEl.textContent=s.score; blip(true); hopBunny(); sparkle(n.lane); showJudge(kind); showCombo();
  if(n.el){const e=n.el;e.classList.add("gone");setTimeout(()=>e.remove(),200);}
}
function registerMiss(n){
  const s=state; s.miss++; s.combo=0; blip(false); sadBunny(); showJudge("MISS"); showCombo();
  if(n.el){const e=n.el;e.style.opacity="0";setTimeout(()=>e.remove(),150);}
}

function showJudge(kind){
  const c={PERFECT:"#ff5fa0",GREAT:"#ff8ac4",GOOD:"#c98ad0",MISS:"#9aa0c0"};
  const t={PERFECT:"퍼펙트! ✨",GREAT:"좋아요!",GOOD:"굿!",MISS:"앗.."};
  judgeEl.textContent=t[kind]; judgeEl.style.color=c[kind];
  judgeEl.style.animation="none";void judgeEl.offsetWidth;judgeEl.style.animation="judgep .7s ease";
}
function showCombo(){const s=state; comboEl.innerHTML=s.combo>=2?`<div class="num pop">${s.combo}</div><div class="txt">COMBO</div>`:"";}
function flashTarget(lane){const t=hitline.querySelector(`.target[data-lane="${lane}"]`);if(t){t.classList.remove("flash");void t.offsetWidth;t.classList.add("flash");}}
function moveBunny(lane){bunny.style.left=(laneX[lane]-52)+"px";}
let revT=null;
function hopBunny(){bunny.classList.remove("sad","hop");void bunny.offsetWidth;bunny.classList.add("hop");
  bunnyImg.src=ASSETS.bunny_happy;clearTimeout(revT);revT=setTimeout(()=>bunnyImg.src=ASSETS.bunny_idle,330);}
function sadBunny(){bunny.classList.remove("hop","sad");void bunny.offsetWidth;bunny.classList.add("sad");
  bunnyImg.src=ASSETS.bunny_sad;clearTimeout(revT);revT=setTimeout(()=>bunnyImg.src=ASSETS.bunny_idle,340);}
function sparkle(lane){
  const e=["✨","💗","⭐","🌟","🌸"];
  for(let i=0;i<5;i++){const sp=document.createElement("div");sp.className="spark";
    sp.textContent=e[(Math.random()*e.length)|0];
    sp.style.left=laneX[lane]+"px";sp.style.top=(hitY-20)+"px";
    sp.style.setProperty("--dx",(Math.random()*80-40)+"px");
    sp.style.setProperty("--dy",(-Math.random()*70-20)+"px");
    $("#game").appendChild(sp);setTimeout(()=>sp.remove(),600);}
}

function finish(){
  const s=state; s.running=false;
  playfield.querySelectorAll(".note").forEach(e=>e.remove());
  const total=s.chart.length, acc=total?Math.round((s.perfect*1+s.great*0.7+s.good*0.4)/total*100):0;
  const rank=acc>=95?"S":acc>=80?"A":acc>=60?"B":"C";
  $("#rankImg").src=RANK_IMG[rank];
  $("#endBunny").src=(rank==="S"||rank==="A")?ASSETS.bunny_happy:(rank==="B"?ASSETS.bunny_idle:ASSETS.bunny_sad);
  $("#rScore").textContent=s.score; $("#rCombo").textContent=s.maxCombo;
  $("#rPerfect").textContent=s.perfect; $("#rAcc").textContent=acc+"%";
  show("result");
  if(rank==="S"||rank==="A")for(let i=0;i<14;i++)setTimeout(resultSpark,i*70);
}
function resultSpark(){const sp=document.createElement("div");sp.className="spark";
  sp.textContent=["✨","💗","⭐","🌸"][(Math.random()*4)|0];
  sp.style.left=(20+Math.random()*60)+"%";sp.style.top=(15+Math.random()*30)+"%";
  sp.style.setProperty("--dx",(Math.random()*120-60)+"px");
  sp.style.setProperty("--dy",(Math.random()*120-30)+"px");
  $("#result").appendChild(sp);setTimeout(()=>sp.remove(),600);}
function quitToTitle(){if(state)state.running=false;playfield.querySelectorAll(".note").forEach(e=>e.remove());show("title");}

/* 곡 목록 */
const list=$("#songList");
Object.entries(SONGS).forEach(([key,song])=>{
  const b=document.createElement("button");b.className="song-btn";
  b.innerHTML=`<span class="emoji">${song.emoji}</span><span>${song.name}</span><span class="meta">🥕 ${song.notes.length}</span>`;
  b.addEventListener("click",()=>startGame(key));list.appendChild(b);
});

/* 입력 */
$("#game").addEventListener("pointerdown",e=>{
  if(!state||!state.running)return;
  const rect=$("#app").getBoundingClientRect();
  const margin=rect.width*0.06, usable=rect.width-margin*2;
  let lane=Math.floor((e.clientX-rect.left-margin)/usable*LANES);
  lane=Math.max(0,Math.min(LANES-1,lane)); tapLane(lane);
},{passive:true});
window.addEventListener("keydown",e=>{const i=KEYS.indexOf(e.key.toLowerCase());if(i>=0&&state&&state.running){e.preventDefault();tapLane(i);}});
$("#backBtn").addEventListener("click",quitToTitle);
$("#retry").addEventListener("click",()=>startGame(state.key));
$("#toTitle").addEventListener("click",quitToTitle);

/* 난이도 선택 */
document.querySelectorAll(".diff-btn").forEach(b=>{
  b.addEventListener("click",()=>{
    currentDiff=b.dataset.diff;
    document.querySelectorAll(".diff-btn").forEach(x=>x.classList.toggle("active",x===b));
  });
});

show("title");
</script>
</body>
</html>
